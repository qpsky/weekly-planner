<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F7F3EE; font-family: 'Inter', Arial, sans-serif; color: #3D3D3D; min-height: 100vh; padding: 2rem 1.5rem; }
  .planner-wrap { max-width: 1400px; margin: 0 auto; }
  .planner-title { text-align: center; font-family: Georgia, 'Times New Roman', serif; font-size: 28px; font-weight: normal; color: #3D3D3D; letter-spacing: 0.1em; margin-bottom: 5px; }
  .planner-subtitle { text-align: center; font-size: 11px; color: #999; margin-bottom: 12px; }
  .week-input-row { display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 12px; }
  .week-input-row label { font-size: 11px; color: #777; }
  .week-input-row input { font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 1px solid #D8D0C8; background: #fff; color: #3D3D3D; width: 180px; font-family: 'Inter', Arial, sans-serif; }
  .week-input-row input:focus { outline: none; border-color: #8FAF8A; }
  .ornament { text-align: center; color: #bbb; font-size: 12px; margin-bottom: 16px; letter-spacing: 5px; }

  .top-bar { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 6px; }
  .save-btn { font-size: 10px; font-family: 'Inter', Arial, sans-serif; padding: 4px 14px; border-radius: 5px; border: 1px solid #8FAF8A; background: #EFF5EE; color: #4a6e45; cursor: pointer; transition: background 0.15s; }
  .save-btn:hover { background: #ddeedd; }
  .clear-btn { font-size: 10px; font-family: 'Inter', Arial, sans-serif; padding: 4px 14px; border-radius: 5px; border: 1px solid #E8D0D0; background: #fdf4f4; color: #a05050; cursor: pointer; transition: background 0.15s; }
  .clear-btn:hover { background: #f9e8e8; }
  .save-status { font-size: 10px; color: #aaa; min-width: 120px; text-align: left; }

  .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-bottom: 14px; }

  .day-col { background: #fff; border-radius: 10px; border: 1px solid #E8E0D8; overflow: hidden; display: flex; flex-direction: column; min-width: 0; }

  .day-header { padding: 7px 6px 6px; text-align: center; font-size: 9px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; border-bottom: 2px solid transparent; }
  .day-header.weekday { background: #EFF5EE; color: #4a6e45; border-bottom-color: #8FAF8A; }
  .day-header.weekend { background: #F8EEF0; color: #8a4f4f; border-bottom-color: #D4A5A5; }

  /* Day theme block */
  .day-theme { padding: 7px 8px 8px; border-bottom: 2px solid #E8E0D8; background: #FDFAF6; }
  .day-theme-label {
    font-size: 7px; text-transform: uppercase; letter-spacing: 0.12em;
    color: #C9A84C; display: flex; align-items: center; gap: 4px;
    margin-bottom: 5px; font-weight: 500;
  }
  .day-theme-label::after { content: ''; flex: 1; height: 0.5px; background: #EDE6DE; }
  .day-theme-input {
    width: 100%; font-size: 11px; font-family: Georgia, 'Times New Roman', serif;
    font-style: italic; color: #3D3D3D; background: transparent;
    border: none; outline: none; resize: none; line-height: 1.5;
    min-height: 36px; overflow: hidden; word-break: break-word;
  }
  .day-theme-input::placeholder { color: #D4C9B8; font-size: 10px; }

  .sleep-slots { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1.5px solid #E0D8D0; }
  .sleep-slot { padding: 4px 6px; border-right: 1px solid #EDE6DE; }
  .sleep-slot:last-child { border-right: none; }
  .sleep-label { font-size: 7px; text-transform: uppercase; letter-spacing: 0.1em; color: #aaa; display: flex; align-items: center; gap: 3px; margin-bottom: 2px; }
  .sleep-input { width: 100%; font-size: 9px; font-family: 'Inter', Arial, sans-serif; background: transparent; border: none; outline: none; color: #3D3D3D; padding: 0; }
  .sleep-input::placeholder { color: #ccc; font-size: 8px; }

  .section-divider { display: flex; align-items: center; gap: 4px; padding: 5px 6px 2px; border-top: 1px solid #F0EAE2; font-size: 7.5px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; }
  .section-divider .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .section-divider .line { flex: 1; height: 0.5px; background: #EDE6DE; }
  .sec-baseball { color: #3a6a96; } .sec-baseball .dot { background: #5B8DB8; }
  .sec-training  { color: #a05c30; } .sec-training .dot  { background: #C97B4B; }
  .sec-movement  { color: #4a8a36; } .sec-movement .dot  { background: #7BAF6B; }
  .sec-recovery  { color: #7056a0; } .sec-recovery .dot  { background: #9B7BB8; }
  .sec-daily     { color: #8a7530; } .sec-daily .dot     { background: #B8A45B; }

  .tasks-area { padding: 2px 6px 5px; }
  .task-row { display: flex; align-items: flex-start; gap: 5px; padding: 2px 1px; border-bottom: 1px solid #F0EAE2; min-height: 20px; }
  .task-row:last-child { border-bottom: none; }
  .task-check { width: 11px; height: 11px; border: 1px solid #C8C0B8; border-radius: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 3px; background: #fff; transition: background 0.12s, border-color 0.12s; user-select: none; }
  .task-check:hover { border-color: #8FAF8A; }
  .task-check.checked { background: #8FAF8A; border-color: #5c7a57; }
  .task-check.checked .ci { opacity: 1; }
  .ci { opacity: 0; color: white; font-size: 8px; font-weight: 700; line-height: 1; }
  .task-text { flex: 1; min-width: 0; font-size: 9px; color: #3D3D3D; background: transparent; border: none; outline: none; resize: none; font-family: 'Inter', Arial, sans-serif; line-height: 1.4; padding: 1px 0; min-height: 16px; overflow: hidden; word-break: break-word; }
  .task-text.done { text-decoration: line-through; color: #bbb; }
  .task-text::placeholder { color: #ccc; font-size: 8px; }
  .remove-btn { width: 11px; height: 11px; border-radius: 2px; border: none; background: transparent; color: #ccc; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 3px; padding: 0; opacity: 0; transition: opacity 0.1s, color 0.1s; font-size: 10px; font-family: Arial, sans-serif; line-height: 1; }
  .task-row:hover .remove-btn { opacity: 1; }
  .remove-btn:hover { color: #c0504d; }
  .row-btns { display: flex; padding: 2px 2px; border-top: 1px dashed #EDE6DE; margin-top: 1px; }
  .add-btn { background: transparent; border: none; color: #bbb; font-size: 8px; cursor: pointer; display: flex; align-items: center; gap: 2px; font-family: 'Inter', Arial, sans-serif; padding: 1px 2px; border-radius: 2px; }
  .add-btn:hover { color: #777; }

  .notes-section { background: #fff; border-radius: 10px; border: 1px solid #E8E0D8; overflow: hidden; }
  .notes-header { padding: 8px 14px 6px; font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #4a6e45; background: #EFF5EE; border-bottom: 2px solid #8FAF8A; display: flex; align-items: center; gap: 6px; }
  .notes-body { display: grid; grid-template-columns: 1fr 1fr; }
  .notes-col { padding: 10px 12px; border-right: 1px solid #EDE6DE; }
  .notes-col:last-child { border-right: none; }
  .notes-col-label { font-size: 8px; text-transform: uppercase; letter-spacing: 0.1em; color: #bbb; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
  .notes-col-label::after { content: ''; flex: 1; height: 0.5px; background: #EDE6DE; }
  .notes-textarea { width: 100%; min-height: 60px; background: transparent; border: none; outline: none; resize: none; font-family: 'Inter', Arial, sans-serif; font-size: 10px; color: #3D3D3D; line-height: 1.6; }
  .notes-textarea::placeholder { color: #ccc; }
  .footer-ornament { text-align: center; color: #ccc; font-size: 10px; margin-top: 12px; letter-spacing: 4px; }
</style>
</head>
<body>
<div class="planner-wrap">
  <div class="planner-title">✦ &nbsp; Weekly Planner &nbsp; ✦</div>
  <div class="planner-subtitle">hover a task to remove it &nbsp;·&nbsp; click checkbox to cross off</div>
  <div class="week-input-row">
    <label for="week-of">Week of</label>
    <input type="text" id="week-of" placeholder="e.g. Jun 23 – Jun 29">
  </div>
  <div class="top-bar">
    <button class="save-btn" onclick="saveData()">&#10003; Save</button>
    <button class="clear-btn" onclick="clearData()">&#10007; Clear week</button>
    <span class="save-status" id="save-status"></span>
  </div>
  <div class="ornament">— ✦ —</div>
  <div class="days-grid" id="days-grid"></div>
  <div class="notes-section">
    <div class="notes-header">&#9998;&nbsp; Notes &amp; reminders</div>
    <div class="notes-body">
      <div class="notes-col">
        <div class="notes-col-label">Important</div>
        <textarea class="notes-textarea" id="notes-important" placeholder="Key things to remember this week…" rows="4"></textarea>
      </div>
      <div class="notes-col">
        <div class="notes-col-label">Ideas</div>
        <textarea class="notes-textarea" id="notes-ideas" placeholder="Ideas, thoughts, links…" rows="4"></textarea>
      </div>
    </div>
  </div>
  <div class="footer-ornament">— ✦ —</div>
</div>

<script>
const DAYS = [
  { name: 'Mon', weekend: false }, { name: 'Tue', weekend: false },
  { name: 'Wed', weekend: false }, { name: 'Thu', weekend: false },
  { name: 'Fri', weekend: false }, { name: 'Sat', weekend: true },
  { name: 'Sun', weekend: true },
];
const SECTIONS = [
  { key: 'baseball', label: 'Baseball',    cls: 'sec-baseball', tasks: 2 },
  { key: 'training', label: 'Training',    cls: 'sec-training', tasks: 2 },
  { key: 'movement', label: 'Movement',    cls: 'sec-movement', tasks: 2 },
  { key: 'recovery', label: 'Recovery',    cls: 'sec-recovery', tasks: 2 },
  { key: 'daily',    label: 'Daily tasks', cls: 'sec-daily',    tasks: 3 },
];
const STORAGE_KEY = 'weekly_planner_data';

const state = {};
DAYS.forEach(d => {
  state[d.name] = { wake: '', bed: '', theme: '' };
  SECTIONS.forEach(s => {
    state[d.name][s.key] = Array.from({ length: s.tasks }, () => ({ text: '', done: false }));
  });
});

function saveData() {
  const data = {
    weekOf: document.getElementById('week-of').value,
    notesImportant: document.getElementById('notes-important').value,
    notesIdeas: document.getElementById('notes-ideas').value,
    days: state,
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  const status = document.getElementById('save-status');
  const now = new Date();
  status.textContent = 'Saved at ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  setTimeout(() => { status.textContent = ''; }, 3000);
}

function loadData() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    if (data.weekOf) document.getElementById('week-of').value = data.weekOf;
    if (data.notesImportant) document.getElementById('notes-important').value = data.notesImportant;
    if (data.notesIdeas) document.getElementById('notes-ideas').value = data.notesIdeas;
    if (data.days) {
      DAYS.forEach(d => {
        if (data.days[d.name]) {
          state[d.name].wake  = data.days[d.name].wake  || '';
          state[d.name].bed   = data.days[d.name].bed   || '';
          state[d.name].theme = data.days[d.name].theme || '';
          SECTIONS.forEach(s => {
            if (data.days[d.name][s.key]) state[d.name][s.key] = data.days[d.name][s.key];
          });
        }
      });
    }
  } catch(e) { console.error('Failed to load saved data', e); }
}

function clearData() {
  if (!confirm('Clear all tasks and start fresh? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('week-of').value = '';
  document.getElementById('notes-important').value = '';
  document.getElementById('notes-ideas').value = '';
  DAYS.forEach(d => {
    state[d.name].wake  = '';
    state[d.name].bed   = '';
    state[d.name].theme = '';
    SECTIONS.forEach(s => {
      state[d.name][s.key] = Array.from({ length: s.tasks }, () => ({ text: '', done: false }));
    });
  });
  renderAll();
  document.getElementById('save-status').textContent = 'Cleared.';
  setTimeout(() => { document.getElementById('save-status').textContent = ''; }, 2000);
}

setInterval(saveData, 30000);

function renderAll() {
  const grid = document.getElementById('days-grid');
  grid.innerHTML = '';
  DAYS.forEach(d => grid.appendChild(buildCol(d)));
}

function buildCol(day) {
  const col = document.createElement('div');
  col.className = 'day-col';

  // Day header
  const hdr = document.createElement('div');
  hdr.className = 'day-header ' + (day.weekend ? 'weekend' : 'weekday');
  hdr.textContent = day.name;
  col.appendChild(hdr);

  // Theme block
  const themeBlock = document.createElement('div');
  themeBlock.className = 'day-theme';
  const themeLabel = document.createElement('div');
  themeLabel.className = 'day-theme-label';
  themeLabel.textContent = '✦ focus';
  const themeInput = document.createElement('textarea');
  themeInput.className = 'day-theme-input';
  themeInput.placeholder = 'Theme or intention for the day…';
  themeInput.rows = 2;
  themeInput.value = state[day.name].theme;
  themeInput.oninput = function() {
    state[day.name].theme = this.value;
    this.style.height = 'auto';
    this.style.height = this.scrollHeight + 'px';
  };
  if (state[day.name].theme) setTimeout(() => { themeInput.style.height = 'auto'; themeInput.style.height = themeInput.scrollHeight + 'px'; }, 0);
  themeBlock.appendChild(themeLabel);
  themeBlock.appendChild(themeInput);
  col.appendChild(themeBlock);

  // Sleep slots
  const sleep = document.createElement('div');
  sleep.className = 'sleep-slots';
  ['wake', 'bed'].forEach(type => {
    const slot = document.createElement('div');
    slot.className = 'sleep-slot';
    const lbl = document.createElement('div');
    lbl.className = 'sleep-label';
    lbl.innerHTML = type === 'wake' ? '&#9728; Wake' : '&#9789; Bed';
    const inp = document.createElement('input');
    inp.className = 'sleep-input';
    inp.type = 'text';
    inp.placeholder = type === 'wake' ? '6:00 am' : '10:00 pm';
    inp.value = state[day.name][type];
    inp.oninput = () => { state[day.name][type] = inp.value; };
    slot.appendChild(lbl); slot.appendChild(inp);
    sleep.appendChild(slot);
  });
  col.appendChild(sleep);

  // Sections
  SECTIONS.forEach(sec => {
    const div = document.createElement('div');
    div.className = 'section-divider ' + sec.cls;
    div.innerHTML = '<span class="dot"></span><span>' + sec.label + '</span><span class="line"></span>';
    col.appendChild(div);

    const area = document.createElement('div');
    area.className = 'tasks-area';
    state[day.name][sec.key].forEach((task, ti) => area.appendChild(buildTaskRow(day.name, sec.key, ti, task)));

    const rowBtns = document.createElement('div');
    rowBtns.className = 'row-btns';
    const addBtn = document.createElement('button');
    addBtn.className = 'add-btn';
    addBtn.textContent = '+ add';
    addBtn.onclick = () => { state[day.name][sec.key].push({ text: '', done: false }); renderAll(); };
    rowBtns.appendChild(addBtn);
    area.appendChild(rowBtns);
    col.appendChild(area);
  });

  return col;
}

function buildTaskRow(dayName, secKey, ti, task) {
  const row = document.createElement('div');
  row.className = 'task-row';

  const check = document.createElement('div');
  check.className = 'task-check' + (task.done ? ' checked' : '');
  check.setAttribute('role', 'checkbox');
  check.setAttribute('aria-checked', String(task.done));
  check.setAttribute('tabindex', '0');
  check.innerHTML = '<span class="ci">&#10003;</span>';
  const toggle = () => { state[dayName][secKey][ti].done = !state[dayName][secKey][ti].done; renderAll(); };
  check.onclick = toggle;
  check.onkeydown = e => { if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggle(); } };

  const inp = document.createElement('textarea');
  inp.className = 'task-text' + (task.done ? ' done' : '');
  inp.placeholder = '—';
  inp.value = task.text;
  inp.rows = 1;
  inp.oninput = function() {
    state[dayName][secKey][ti].text = this.value;
    this.style.height = 'auto';
    this.style.height = this.scrollHeight + 'px';
  };
  if (task.text) setTimeout(() => { inp.style.height = 'auto'; inp.style.height = inp.scrollHeight + 'px'; }, 0);

  const removeBtn = document.createElement('button');
  removeBtn.className = 'remove-btn';
  removeBtn.setAttribute('aria-label', 'Remove task');
  removeBtn.textContent = '✕';
  removeBtn.onclick = () => { state[dayName][secKey].splice(ti, 1); renderAll(); };

  row.appendChild(check);
  row.appendChild(inp);
  row.appendChild(removeBtn);
  return row;
}

loadData();
renderAll();
</script>
</body>
</html>
